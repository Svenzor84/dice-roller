name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            binary: target/release/dice-roller.exe
            asset: dice-roller-windows.exe
          - os: ubuntu-latest
            binary: target/release/dice-roller
            asset: dice-roller-linux
          - os: macos-latest
            binary: target/release/dice-roller
            asset: dice-roller-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
